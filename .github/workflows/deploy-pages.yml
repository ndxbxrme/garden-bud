name: Deploy GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Derive Vite base path
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ -n "$PAGES_CUSTOM_DOMAIN" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          elif [ "$repo_name" = "${GITHUB_ACTOR}.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${repo_name}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          BASE_PATH: ${{ env.BASE_PATH }}
        run: |
          echo "Building with BASE_PATH=$BASE_PATH"
          npm run build
          sed -n '1,80p' dist/index.html

      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          if [ -n "$PAGES_CUSTOM_DOMAIN" ]; then
            printf '%s\n' "$PAGES_CUSTOM_DOMAIN" > dist/CNAME
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
